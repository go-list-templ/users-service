name: Lint
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  hadolint:
    name: lint docker
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-hadolint@v1
        with:
          fail_on_error: true
          reporter: github-pr-review

  golangci:
    name: lint code
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
          args: --config=.docker/lint/conf.yml --issues-exit-code=0
