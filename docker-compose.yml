services:
  app:
    container_name: app.${APP_NAME}
    build:
      context: .
      dockerfile: .docker/app/Dockerfile
    ports:
      - "${GRPC_PORT}:${GRPC_PORT}"
      - "${DIAGNOSTIC_PORT}:${DIAGNOSTIC_PORT}"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      sequin:
        condition: service_started
      pg-1:
        condition: service_healthy
      pg-2:
        condition: service_healthy
    networks:
      - app

  redis:
    container_name: redis.${APP_NAME}
    image: redis:8.4.0
    volumes:
      - redis_data:/redis_data
    ports:
      - '${REDIS_PORT}:6379'
    networks:
      - app
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "${REDIS_PORT}", "ping" ]
      interval: 1s
      timeout: 3s
      retries: 30
    expose:
      - '${REDIS_PORT}'

  rabbitmq:
    container_name: rabbitmq.${APP_NAME}
    image: rabbitmq:4.2.0-management
    ports:
      - '${MQ_PORT}:5672'
      - '${MQ_ADMIN_PORT}:15672'
    networks:
      - app
    volumes:
      - ./.docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./.docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 30

  pg-1:
    container_name: postgres_1
    image: bitnamilegacy/postgresql-repmgr:17.6.0-debian-12-r2
    ports:
      - "5432:5432"
    volumes:
      - pg_1_data:/bitnami/postgresql
      - ./internal/adapter/persistence/postgres/init/:/docker-entrypoint-initdb.d/
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_USERNAME=${DB_USERNAME}
      - POSTGRESQL_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_DATABASE=${DB_DATABASE}
      - REPMGR_PASSWORD=repmgrpassword
      - REPMGR_PRIMARY_HOST=pg-1
      - REPMGR_PRIMARY_PORT=5432
      - REPMGR_PARTNER_NODES=pg-1,pg-2:5432
      - REPMGR_NODE_NAME=pg-1
      - REPMGR_NODE_NETWORK_NAME=pg-1
      - REPMGR_PORT_NUMBER=5432
      - REPMGR_CONNECT_TIMEOUT=1
      - REPMGR_RECONNECT_ATTEMPTS=2
      - REPMGR_RECONNECT_INTERVAL=1
      - REPMGR_MASTER_RESPONSE_TIMEOUT=5
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}" ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app

  pg-2:
    container_name: postgres_2
    image: bitnamilegacy/postgresql-repmgr:17.6.0-debian-12-r2
    ports:
      - "5433:5432"
    volumes:
      - pg_2_data:/bitnami/postgresql
      - ./internal/adapter/persistence/postgres/init/:/docker-entrypoint-initdb.d/
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_USERNAME=${DB_USERNAME}
      - POSTGRESQL_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_DATABASE=${DB_DATABASE}
      - REPMGR_PASSWORD=repmgrpassword
      - REPMGR_PRIMARY_HOST=pg-1
      - REPMGR_PRIMARY_PORT=5432
      - REPMGR_PARTNER_NODES=pg-1,pg-2:5432
      - REPMGR_NODE_NAME=pg-2
      - REPMGR_NODE_NETWORK_NAME=pg-2
      - REPMGR_PORT_NUMBER=5432
      - REPMGR_CONNECT_TIMEOUT=1
      - REPMGR_RECONNECT_ATTEMPTS=2
      - REPMGR_RECONNECT_INTERVAL=1
      - REPMGR_MASTER_RESPONSE_TIMEOUT=5
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}" ]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      - pg-1
    networks:
      - app

  sequin:
    container_name: sequin.${APP_NAME}
    image: sequin/sequin:latest
    ports:
      - '${SEQUIN_PORT}:7376'
    networks:
      - app
    environment:
      - PG_HOSTNAME=db
      - PG_DATABASE=${DB_DATABASE}
      - PG_PORT=${DB_PORT}
      - PG_USERNAME=${DB_USERNAME}
      - PG_PASSWORD=${DB_PASSWORD}
      - PG_POOL_SIZE=${DB_MAX_CONN}
      - SECRET_KEY_BASE=wDPLYus0pvD6qJhKJICO4dauYPXfO/Yl782Zjtpew5qRBDp7CZvbWtQmY0eB13If
      - VAULT_KEY=2Sig69bIpuSm2kv0VQfDekET2qy8qUZGI8v3/h3ASiY=
      - REDIS_URL=redis://redis:${REDIS_PORT}
      - CONFIG_FILE_PATH=/config/main.yml
      - SEQUIN_EMAIL=${SEQUIN_EMAIL}
      - SEQUIN_PASSWORD=${SEQUIN_PASSWORD}
      - MQ_USERNAME=${MQ_USERNAME}
      - MQ_PASSWORD=${MQ_PASSWORD}
      - MQ_PORT=${MQ_PORT}
    volumes:
      - ./.docker/sequin/sequin.yml:/config/main.yml
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  otel:
    container_name: otel.${APP_NAME}
    image: grafana/otel-lgtm:latest
    ports:
      - '${OTEL_GRAFANA_PORT}:3000'
      - '${OTEL_GRPC_PORT}:4317'
    networks:
      - app
    volumes:
      - ./.docker/otel/data:/data
    environment:
      - ENABLE_LOGS_ALL=true
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:
  pg_1_data:
  pg_2_data:

networks:
  app:
    driver: bridge