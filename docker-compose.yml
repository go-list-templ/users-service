services:
  app:
    container_name: app.${APP_NAME}
    build:
      context: .
      dockerfile: .docker/app/Dockerfile
    ports:
      - "${GRPC_PORT}:${GRPC_PORT}"
      - "${DIAGNOSTIC_PORT}:${DIAGNOSTIC_PORT}"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - app

  redis:
    container_name: redis.${APP_NAME}
    image: redis:8.4.0
    volumes:
      - redis_data:/redis_data
    ports:
      - '${REDIS_PORT}:6379'
    networks:
      - app
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "${REDIS_PORT}", "ping" ]
      interval: 1s
      timeout: 3s
      retries: 30
    expose:
      - '${REDIS_PORT}'

  db:
    container_name: db.${APP_NAME}
    image: postgres:17
    environment:
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_DATABASE}'
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT}:5432'
    networks:
      - app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}" ]
      interval: 1s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  otel:
    container_name: otel.${APP_NAME}
    image: grafana/otel-lgtm:latest
    ports:
      - '${OTEL_GRAFANA_PORT}:3000'
      - '${OTEL_GRPC_PORT}:4317'
    networks:
      - app
    volumes:
      - ./.docker/otel/data:/data
    environment:
      - ENABLE_LOGS_ALL=true
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  db_data:

networks:
  app:
    driver: bridge