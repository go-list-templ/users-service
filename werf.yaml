configVersion: 1
project: users-service
---
image: build
from: golang:1.26-alpine3.23
git:
  - add: /
    to: /app
shell:
  beforeInstall:
    - apk add curl tar
    - curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xvz
  install:
    - cd /app
    - go mod download
  setup:
    - cd /app
    - go build -ldflags="-s -w" -o /bin/app cmd/main.go
---
image: app
from: gcr.io/distroless/static-debian12:nonroot
git:
  - add: /migrations
    to: /migrations/schemes
import:
  - image: build
    add: /bin/app
    to: /bin/app
    after: setup
  - image: build
    add: /migrate
    to: /migrations/migrate
    after: setup