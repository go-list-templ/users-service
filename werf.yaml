configVersion: 1
project: users-service
---
image: build
from: golang:1.26-alpine3.23
git:
  - add: /
    to: /app
    stageDependencies:
      install:
        - "go.mod"
        - "go.sum"
      setup:
        - "**/*.go"
      beforeSetup:
        - "migrations/**/*"
shell:
  beforeInstall:
    - apk add curl tar
    - curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xvz
  install:
    - cd /app && go mod download
  setup:
    - cd /app && go build -ldflags="-s -w" -o /bin/app cmd/main.go
---
image: app
from: gcr.io/distroless/static-debian12:nonroot
import:
  - image: build
    add: /migrate
    to: /migrations/migrate
    after: setup
  - image: build
    add: /app/migrations
    to: /migrations/schemes
    after: setup
  - image: build
    add: /bin/app
    to: /bin/app
    after: setup
imageSpec:
  config:
    cmd:
      - "/bin/app"