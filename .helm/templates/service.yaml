apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
spec:
  selector:
    app: {{ .Chart.Name }}
  ports:
    - name: grpc
      protocol: TCP
      port: {{ .Values.app.grpc.port }}
      targetPort: {{ .Values.app.grpc.port }}
    - name: diagnostic
      protocol: TCP
      port: {{ .Values.app.diagnostic.port }}
      targetPort: {{ .Values.app.diagnostic.port }}