apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      imagePullSecrets:
        - name: registrysecret
      containers:
        - name: app
          image: {{ .Values.werf.image.app }}
          ports:
            - containerPort: {{ .Values.service.grpcPort }}
            - containerPort: {{ .Values.service.diagPort }}
          env:
            - name: DB_PASSWORD
              value: {{ .Values.env.DB_HOST }}
            - name: DB_HOST
              value: {{ .Values.env.DB_HOST }}