app:
  replicas: 3
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 512Mi
  grpc:
    name: grpc
    port: 8080
    protocol: TCP
    time: "30s"
    timeout: "5s"
    maxIdle: "15m"
    maxAge: "30m"
  http:
    name: http
    port: 8081
    protocol: TCP
    httpTimeout: "5s"
    idleTimeout: "30s"
  shutdownTimeout: "30s"
  db:
    maxConn: 100
    minConn: 5
    connTimeout: "10s"
    maxConnTime: "1h"
    maxConnIdleTime: "5m"
    healthCheckPeriod: "10m"
  redis:
    dialTimeout: "10s"
    readTimeout: "50ms"
    writeTimeout: "50ms"
    maxRetries: -1
    minRetryBackoff: "5ms"
    maxRetryBackoff: "15ms"
    pool:
      size: 100
      minIdle: 20
      timeout: "10ms"

postgresql:
  enabled: true
  architecture: standalone
  host: postgresql
  port: 5432
  auth:
    database: users_db
    username: postgres
    password: "root_password"
  primary:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 512Mi

redis:
  host: redis-master
  port: 6379
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

telemetry:
  collector:
    url: "alloy.monitoring.svc.cluster.local:4317"
    timeout: "15s"
    isTls: false
  pyroscope:
    url: "http://alloy.monitoring.svc.cluster.local:4040"
