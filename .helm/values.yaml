app:
  replicas: 3
  limits:
    cpu: 100m
    memory: 256Mi
  grpc:
    port: 8080
    time: "30s"
    timeout: "5s"
    maxIdle: "15m"
    maxAge: "30m"
  diagnostic:
    port: 8081
    httpTimeout: "5s"
    idleTimeout: "30s"
  shutdownTimeout: "30s"
  db:
    maxConn: 100
    minConn: 5
    connTimeout: "10s"
    maxConnTime: "1h"
    maxConnIdleTime: "5m"
    healthCheckPeriod: "10m"
  redis:
    dialTimeout: "10s"
    readTimeout: "50ms"
    writeTimeout: "50ms"
    maxRetries: -1
    minRetryBackoff: "5ms"
    maxRetryBackoff: "15ms"
    pool:
      size: 100
      minIdle: 20
      timeout: "10ms"

postgresql:
  enabled: true
  architecture: standalone
  auth:
    database: users_db
    username: postgres
    password: "root_password"
  primary:
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      limits:
        memory: 128Mi

otel:
  url: "alloy.telemetry.svc.cluster.local:4317"
  isTls: false