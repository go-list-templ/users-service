app:
  replicas: 3
  grpc:
    port: 8080
    time: "30s"
    timeout: "5s"
    maxIdle: "15m"
    maxAge: "30m"
  diagnostic:
    port: 8081
    httpTimeout: "5s"
    idleTimeout: "30s"
  shutdownTimeout: "30s"

redis:
  url: "host.docker.internal:6379"
  dialTimeout: "50ms"
  readTimeout: "50ms"
  writeTimeout: "50ms"
  maxRetries: -1
  minRetryBackoff: "5ms"
  maxRetryBackoff: "15ms"
  pool:
    size: 100
    minIdle: 20
    timeout: "10ms"

db:
  url: "postgres://postgres:root@host.docker.internal:5432/users?sslmode=disable"
  port: 5432
  maxConn: 100
  minConn: 5
  connTimeout: "10s"
  maxConnTime: "1h"
  maxConnIdleTime: "5m"
  healthCheckPeriod: "10m"

otel:
  url: "host.docker.internal:4317"
  isTls: false